<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RhymeBook - Lyric Lab</title>
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-card: #1e1e1e;
      --bg-hover: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --text-muted: #666666;
      --accent-primary: #9333ea;
      --accent-secondary: #a855f7;
      --accent-gold: #fbbf24;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --border-color: #333333;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: var(--spacing-md);
    }

    .header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
    }

    .logo-icon { font-size: 24px; }
    .logo-text { font-size: 20px; font-weight: 700; color: var(--accent-primary); }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .section {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-sm);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .section-badge {
      background: var(--accent-primary);
      color: white;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      padding: var(--spacing-md);
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .tool-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
    }

    .tool-card h3 {
      font-size: 14px;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
    }

    .tool-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: var(--spacing-sm);
      font-size: 13px;
      margin-bottom: var(--spacing-sm);
    }

    .tool-input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .btn {
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-secondary); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .results {
      margin-top: var(--spacing-sm);
      max-height: 150px;
      overflow-y: auto;
    }

    .result-item {
      display: inline-block;
      background: var(--bg-tertiary);
      padding: 4px 8px;
      margin: 2px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .result-item.perfect { border-left: 2px solid var(--success); }
    .result-item.slant { border-left: 2px solid var(--warning); }
    .result-item.multi { border-left: 2px solid var(--accent-primary); }

    .stats {
      display: flex;
      gap: var(--spacing-md);
      margin-top: var(--spacing-sm);
      font-size: 12px;
      color: var(--text-muted);
    }

    .stat { display: flex; align-items: center; gap: 4px; }
    .stat-value { color: var(--text-primary); font-weight: 600; }

    .toast {
      position: fixed;
      bottom: var(--spacing-md);
      right: var(--spacing-md);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 13px;
      animation: slideIn 0.3s ease;
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--error); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <span class="logo-icon">🎵</span>
      <span class="logo-text">Lyric Lab</span>
    </header>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Song Lyrics</span>
        <span class="section-badge" id="syllable-count">0 syllables</span>
      </div>
      <textarea id="lyrics-input" placeholder="Start writing your lyrics here..."></textarea>
      <div class="stats">
        <div class="stat">Lines: <span class="stat-value" id="line-count">0</span></div>
        <div class="stat">Words: <span class="stat-value" id="word-count">0</span></div>
        <div class="stat">Avg Syllables/Line: <span class="stat-value" id="avg-syllables">0</span></div>
      </div>
    </div>

    <div class="tools-grid">
      <div class="tool-card">
        <h3>🔍 Find Rhymes</h3>
        <input type="text" class="tool-input" id="rhyme-input" placeholder="Enter a word...">
        <button class="btn" id="rhyme-btn">Find Rhymes</button>
        <div class="results" id="rhyme-results"></div>
      </div>

      <div class="tool-card">
        <h3>📖 Thesaurus</h3>
        <input type="text" class="tool-input" id="thesaurus-input" placeholder="Enter a word...">
        <button class="btn" id="thesaurus-btn">Find Synonyms</button>
        <div class="results" id="thesaurus-results"></div>
      </div>

      <div class="tool-card">
        <h3>📊 Flow Analysis</h3>
        <button class="btn" id="flow-btn" style="width: 100%;">Analyze Flow</button>
        <div class="results" id="flow-results"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { App } from '@modelcontextprotocol/ext-apps';
    // MCP App - uses official @modelcontextprotocol/ext-apps SDK
    const app = new App({ name: 'RhymeBook-LyricLab', version: '1.0.0' });

    // DOM Elements
    const lyricsInput = document.getElementById('lyrics-input');
    const syllableCount = document.getElementById('syllable-count');
    const lineCount = document.getElementById('line-count');
    const wordCount = document.getElementById('word-count');
    const avgSyllables = document.getElementById('avg-syllables');
    const rhymeInput = document.getElementById('rhyme-input');
    const rhymeBtn = document.getElementById('rhyme-btn');
    const rhymeResults = document.getElementById('rhyme-results');
    const thesaurusInput = document.getElementById('thesaurus-input');
    const thesaurusBtn = document.getElementById('thesaurus-btn');
    const thesaurusResults = document.getElementById('thesaurus-results');
    const flowBtn = document.getElementById('flow-btn');
    const flowResults = document.getElementById('flow-results');

    // Syllable counter
    function countSyllables(word) {
      word = word.toLowerCase().trim();
      if (word.length <= 3) return 1;
      word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
      word = word.replace(/^y/, '');
      const matches = word.match(/[aeiouy]{1,2}/g);
      return matches ? matches.length : 1;
    }

    function countLineSyllables(line) {
      const words = line.trim().split(/\s+/).filter(w => w.length > 0);
      return words.reduce((sum, word) => sum + countSyllables(word.replace(/[^a-zA-Z]/g, '')), 0);
    }

    // Update stats
    function updateStats() {
      const text = lyricsInput.value;
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      const words = text.trim().split(/\s+/).filter(w => w.length > 0);
      const totalSyllables = lines.reduce((sum, line) => sum + countLineSyllables(line), 0);
      const avg = lines.length > 0 ? (totalSyllables / lines.length).toFixed(1) : 0;

      syllableCount.textContent = `${totalSyllables} syllables`;
      lineCount.textContent = lines.length;
      wordCount.textContent = words.length;
      avgSyllables.textContent = avg;
    }

    lyricsInput.addEventListener('input', updateStats);

    // Show toast
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Find rhymes
    rhymeBtn.addEventListener('click', async () => {
      const word = rhymeInput.value.trim();
      if (!word) return;

      rhymeBtn.disabled = true;
      rhymeBtn.innerHTML = '<span class="loading"></span>';

      try {
        const result = await app.callServerTool({
          name: 'find-rhymes',
          arguments: { word, type: 'all' }
        });

        const data = JSON.parse(result.content[0].text);
        rhymeResults.innerHTML = '';

        if (data.rhymes.perfect?.length) {
          data.rhymes.perfect.slice(0, 10).forEach(r => {
            rhymeResults.innerHTML += `<span class="result-item perfect">${r}</span>`;
          });
        }
        if (data.rhymes.slant?.length) {
          data.rhymes.slant.slice(0, 8).forEach(r => {
            rhymeResults.innerHTML += `<span class="result-item slant">${r}</span>`;
          });
        }
        if (data.rhymes.multi?.length) {
          data.rhymes.multi.slice(0, 6).forEach(r => {
            rhymeResults.innerHTML += `<span class="result-item multi">${r}</span>`;
          });
        }

        if (!rhymeResults.innerHTML) {
          rhymeResults.innerHTML = '<span style="color: var(--text-muted); font-size: 12px;">No rhymes found</span>';
        }
      } catch (err) {
        showToast('Failed to find rhymes', 'error');
      } finally {
        rhymeBtn.disabled = false;
        rhymeBtn.textContent = 'Find Rhymes';
      }
    });

    // Find synonyms
    thesaurusBtn.addEventListener('click', async () => {
      const word = thesaurusInput.value.trim();
      if (!word) return;

      thesaurusBtn.disabled = true;
      thesaurusBtn.innerHTML = '<span class="loading"></span>';

      try {
        const result = await app.callServerTool({
          name: 'find-synonyms',
          arguments: { word }
        });

        const data = JSON.parse(result.content[0].text);
        thesaurusResults.innerHTML = '';

        if (data.synonyms?.length) {
          data.synonyms.slice(0, 12).forEach(s => {
            thesaurusResults.innerHTML += `<span class="result-item">${s}</span>`;
          });
        } else {
          thesaurusResults.innerHTML = '<span style="color: var(--text-muted); font-size: 12px;">No synonyms found</span>';
        }
      } catch (err) {
        showToast('Failed to find synonyms', 'error');
      } finally {
        thesaurusBtn.disabled = false;
        thesaurusBtn.textContent = 'Find Synonyms';
      }
    });

    // Analyze flow
    flowBtn.addEventListener('click', async () => {
      const text = lyricsInput.value.trim();
      if (!text) {
        showToast('Enter some lyrics first', 'error');
        return;
      }

      flowBtn.disabled = true;
      flowBtn.innerHTML = '<span class="loading"></span>';

      try {
        const result = await app.callServerTool({
          name: 'analyze-flow',
          arguments: { text }
        });

        const data = JSON.parse(result.content[0].text);
        flowResults.innerHTML = `
          <div style="font-size: 12px; color: var(--text-secondary);">
            <div>Pattern: <span style="color: var(--accent-primary);">${data.pattern?.join(' ') || 'N/A'}</span></div>
            <div>Consistency: <span style="color: var(--success);">${data.stats?.consistency || 'N/A'}</span></div>
            <div>Variance: <span style="color: var(--warning);">${data.stats?.variance?.toFixed(2) || 'N/A'}</span></div>
          </div>
        `;
      } catch (err) {
        showToast('Failed to analyze flow', 'error');
      } finally {
        flowBtn.disabled = false;
        flowBtn.textContent = 'Analyze Flow';
      }
    });

    // Handle tool results from host
    app.ontoolresult = (result) => {
      if (result?.content?.[0]?.text) {
        try {
          const data = JSON.parse(result.content[0].text);
          if (data.lyrics) {
            lyricsInput.value = data.lyrics;
            updateStats();
          }
        } catch (e) {
          // Not JSON, ignore
        }
      }
    };

    // Connect to host (must be called after setting up handlers)
    await app.connect();
  </script>
</body>
</html>
